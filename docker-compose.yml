services:
  quest-log:
    build: .
    container_name: quest-log
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./quests.db:${DB_PATH}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${APP_PORT}/"]
      interval: "30s"
      timeout: "10s"
      retries: 3
      start_period: "15s"