{{ define "content" }}
<div class="pasture-header">
    <div>
        <h2 style="margin: 0; font-size: 1.5rem;">Today's Flock</h2>
        <p style="color: #666; font-size: 0.9rem; margin-top: 4px;">
            Manage active quests and track progress toward the Weekly Corral.
        </p>
    </div>

    <button class="bad-brain-btn" title="Enable Momentum Mode (Priority Shield Only)">
        🚨 Bad Brain Day
    </button>
</div>

<div class="quest-list">
    {{ range . }}
        {{ template "quest_card" . }}
    {{ else }}
        <div class="empty-state">
            <span style="font-size: 3rem;" role="img" aria-label="Clear sky">🌤️</span>
            <h3 style="margin: 1rem 0 0.5rem 0;">The Pasture is Clear</h3>
            <p style="color: #666; margin: 0;">
                All sheep have been herded. Enjoy your day!
            </p>
        </div>
    {{ end }}
</div>
{{ end }}
