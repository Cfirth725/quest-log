{{ define "quest_card" }}
<div class="quest-card" style="--dynamic-cat-color: {{ .CategoryColor }};">
    <div style="display: flex; align-items: center;">
        
        <div class="quest-accent-bar"></div>
        
        <div>
            <div style="display: flex; align-items: center;">
                <h3 class="quest-title">{{ .Title }}</h3>
                {{ if .IsNonNegotiable }}
                    <span class="badge-must" title="Priority Shield Active">Must Do</span>
                {{ end }}
            </div>
            
            <div class="quest-meta">
                <span style="font-weight: bold; color: var(--dynamic-cat-color);">{{ .CategoryName }}</span>
                &bull; 
                <span>
                    {{ if eq .Difficulty 1 }}🦆 Duck (Easy)
                    {{ else if eq .Difficulty 2 }}🐑 Sheep (Medium)
                    {{ else if eq .Difficulty 3 }}🐄 Cow (Hard)
                    {{ end }}
                </span>
                &bull; 
                <span class="xp-text">+{{ .BaseXP }} XP</span>
            </div>
        </div>
    </div>

    <form action="/quests/complete" method="POST">
        <input type="hidden" name="quest_id" value="{{ .ID }}">
        <button type="submit" class="complete-btn">Complete</button>
    </form>
</div>
{{ end }}
